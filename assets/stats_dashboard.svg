<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1e38"/>
    </linearGradient>
    
    <!-- Orange Gradient -->
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <!-- Blue Gradient -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Green Gradient -->
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="200" fill="url(#bg-grad)" rx="12"/>

  <!-- Card 1: Java Modules -->
  <g transform="translate(30, 25)">
    <!-- Card Base -->
    <rect width="220" height="150" fill="#1e293b" rx="8" stroke="url(#orange-grad)" stroke-width="1.5"/>
    <text x="20" y="35" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="14" fill="#94a3b8">JAVA MODULES</text>
    <text x="20" y="85" font-family="'Segoe UI', sans-serif" font-weight="800" font-size="38" fill="url(#orange-grad)">50+</text>
    <text x="20" y="120" font-family="'Segoe UI', sans-serif" font-weight="400" font-size="12" fill="#cbd5e1">Refactored &amp; Bug-Fixed</text>
    <text x="20" y="135" font-family="'Segoe UI', sans-serif" font-weight="400" font-size="11" fill="#64748b">Package: com.corejava.*</text>
  </g>

  <!-- Card 2: Python Ports -->
  <g transform="translate(290, 25)">
    <!-- Card Base -->
    <rect width="220" height="150" fill="#1e293b" rx="8" stroke="url(#blue-grad)" stroke-width="1.5"/>
    <text x="20" y="35" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="14" fill="#94a3b8">PYTHON PORTS</text>
    <text x="20" y="85" font-family="'Segoe UI', sans-serif" font-weight="800" font-size="38" fill="url(#blue-grad)">45+</text>
    <text x="20" y="120" font-family="'Segoe UI', sans-serif" font-weight="400" font-size="12" fill="#cbd5e1">Production PEP 8 Port</text>
    <text x="20" y="135" font-family="'Segoe UI', sans-serif" font-weight="400" font-size="11" fill="#64748b">Module: utils.*</text>
  </g>

  <!-- Card 3: Quality Assurance -->
  <g transform="translate(550, 25)">
    <!-- Card Base -->
    <rect width="220" height="150" fill="#1e293b" rx="8" stroke="url(#green-grad)" stroke-width="1.5"/>
    <text x="20" y="35" font-family="'Segoe UI', sans-serif" font-weight="600" font-size="14" fill="#94a3b8">DIAGNOSTICS</text>
    <text x="20" y="85" font-family="'Segoe UI', sans-serif" font-weight="800" font-size="38" fill="url(#green-grad)">100%</text>
    <text x="20" y="120" font-family="'Segoe UI', sans-serif" font-weight="400" font-size="12" fill="#cbd5e1">Test suite coverage</text>
    <text x="20" y="135" font-family="'Segoe UI', sans-serif" font-weight="400" font-size="11" fill="#64748b">45 automated assertions</text>
  </g>
</svg>
