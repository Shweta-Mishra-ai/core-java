<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1e38"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    
    <!-- Gold / Orange Gradient for Java -->
    <linearGradient id="java-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <!-- Blue / Teal Gradient for Python -->
    <linearGradient id="py-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Subtle Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect width="800" height="250" fill="url(#bg-grad)" rx="12"/>
  <rect width="800" height="250" fill="url(#grid)" rx="12"/>

  <!-- Left Accent Stripe -->
  <path d="M 0,0 L 15,0 L 5,250 L 0,250 Z" fill="url(#java-grad)" opacity="0.8"/>
  <path d="M 15,0 L 20,0 L 10,250 L 5,250 Z" fill="url(#py-grad)" opacity="0.6"/>

  <!-- Title & Text -->
  <text x="250" y="90" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif" font-weight="800" font-size="42" fill="#ffffff" letter-spacing="2">
    ALGO-LAB
  </text>
  
  <text x="250" y="130" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif" font-weight="600" font-size="18" fill="url(#py-grad)" letter-spacing="1">
    JAVA FUNDAMENTALS &amp; PYTHON PORTS
  </text>

  <text x="250" y="165" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif" font-weight="400" font-size="14" fill="#94a3b8">
    A production-grade, bug-free collection of core algorithms.
  </text>

  <text x="250" y="185" font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif" font-weight="400" font-size="12" fill="#64748b">
    Maintained by Shweta Mishra • Standard MIT License • Fully Unit Tested
  </text>

  <!-- Graphic Symbols -->
  <!-- Coffee Cup (Java) -->
  <g transform="translate(100, 65) scale(0.9)">
    <rect x="25" y="45" width="50" height="45" rx="10" fill="none" stroke="url(#java-grad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 75,55 C 85,55 85,75 75,75" fill="none" stroke="url(#java-grad)" stroke-width="5" stroke-linecap="round"/>
    <path d="M 20,95 L 80,95" stroke="url(#java-grad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Steam -->
    <path d="M 35,35 C 38,25 32,20 35,10" fill="none" stroke="#fdba74" stroke-width="3" stroke-linecap="round"/>
    <path d="M 50,35 C 53,25 47,20 50,10" fill="none" stroke="#fdba74" stroke-width="3" stroke-linecap="round"/>
    <path d="M 65,35 C 68,25 62,20 65,10" fill="none" stroke="#fdba74" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Python Logo Symbol -->
  <g transform="translate(700, 100) scale(1.1)">
    <path d="M -9,-27 C 3,-27 9,-21 9,-15 L 9,-6 C 9,0 3,6 -9,6 L -18,6 C -24,6 -30,12 -30,24 L -30,33 C -30,45 -18,51 -6,51 L 6,51 C 18,51 24,45 24,33 L 24,24 C 24,18 18,12 6,12 L -3,12 C -9,12 -15,6 -15,-6 L -15,-15 C -15,-27 -3,-27 -9,-27 Z" fill="url(#py-grad)" transform="rotate(45) scale(0.6)"/>
    <circle cx="-10" cy="-10" r="1.5" fill="#0f172a"/>
  </g>
</svg>
